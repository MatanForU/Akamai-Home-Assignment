<!-- @dsCard group="Foundations" viewport="700x180" subtitle="Radius + hairline border + soft shadow, light & dark" name="Elevation & Radius" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;font-family:var(--font-sans);background:var(--bg-canvas);padding:20px;display:flex;gap:14px}
.card{flex:1;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);padding:14px;font:var(--text-caption);color:var(--fg-secondary)}
.dark{background:var(--n-950);border-radius:var(--radius-lg);padding:14px;flex:1}
</style></head>
<body>
<div class="card" style="box-shadow:var(--shadow-xs)">shadow-xs / radius-sm</div>
<div class="card" style="border-radius:var(--radius-lg);box-shadow:var(--shadow-md)">shadow-md / radius-lg</div>
<div class="card" style="box-shadow:var(--shadow-lg)">shadow-lg / radius-md</div>
</body></html>
