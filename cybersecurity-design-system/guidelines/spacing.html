<!-- @dsCard group="Spacing" viewport="700x200" subtitle="4px base scale used for padding, gaps, layout rhythm" name="Spacing Scale" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;font-family:var(--font-sans);background:var(--bg-canvas);color:var(--fg-primary);padding:20px}
.row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.bar{background:var(--accent-primary);height:10px;border-radius:2px}
.lbl{font:var(--text-mono-sm);color:var(--fg-tertiary);width:70px}
</style></head>
<body>
<div class="row"><span class="lbl">space-2</span><div class="bar" style="width:var(--space-2)"></div></div>
<div class="row"><span class="lbl">space-4</span><div class="bar" style="width:var(--space-4)"></div></div>
<div class="row"><span class="lbl">space-5</span><div class="bar" style="width:var(--space-5)"></div></div>
<div class="row"><span class="lbl">space-7</span><div class="bar" style="width:var(--space-7)"></div></div>
<div class="row"><span class="lbl">space-9</span><div class="bar" style="width:var(--space-9)"></div></div>
<div class="row"><span class="lbl">space-11</span><div class="bar" style="width:var(--space-11)"></div></div>
</body></html>
