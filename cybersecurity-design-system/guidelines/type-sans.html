<html><head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;font-family:var(--font-sans);background:var(--bg-canvas);color:var(--fg-primary);padding:20px}

<body>
<div class="row"><span class="tag">display</span><span style="font:var(--text-display)">Threat Surface</span></div>

<div class="row"><span class="tag">h2</span><span style="font:var(--text-h2)">Recent Incidents</span></div>
<div class="row"><span class="tag">h3</span><span style="font:var(--text-h3)">Endpoint Detail</span></div>
<div class="row"><span class="tag">body</span><span style="font:var(--text-body)">Analysts review flagged requests before they reach production.</span></div>
<div class="row"><span class="tag">caption</span><span style="font:var(--text-caption);color:var(--fg-secondary)">Last scanned 4 minutes ago</span></div>
