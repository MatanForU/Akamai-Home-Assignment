<!-- @dsCard group="Colors" viewport="700x210" subtitle="Brand + neutrals, dark mode" name="Brand & Neutrals — Dark" -->
<html data-theme="dark"><head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;font-family:var(--font-sans);background:var(--bg-canvas);padding:20px}
.row{display:flex;gap:8px;margin-bottom:10px}
.sw{flex:1;height:56px;border-radius:var(--radius-sm);display:flex;align-items:flex-end;padding:6px 8px;font:var(--text-mono-sm);color:var(--fg-primary);border:1px solid var(--border-subtle)}
.lbl{font:var(--text-overline);letter-spacing:var(--tracking-overline);color:var(--fg-tertiary);margin:0 0 6px 2px}
</style></head>
<body>
<p class="lbl">NEUTRAL</p>
<div class="row">
<div class="sw" style="background:var(--n-1000)">1000</div>
<div class="sw" style="background:var(--n-950)">950</div>
<div class="sw" style="background:var(--n-850)">850</div>
<div class="sw" style="background:var(--n-600)">600</div>
<div class="sw" style="background:var(--n-400);color:#000">400</div>
<div class="sw" style="background:var(--n-150);color:#000">150</div>
<div class="sw" style="background:var(--n-25);color:#000">25</div>
</div>
<p class="lbl">BRAND — TEAL (primary) / CYAN (secondary)</p>
<div class="row">
<div class="sw" style="background:var(--brand-teal-700);color:#fff">teal 700</div>
<div class="sw" style="background:var(--brand-teal-500);color:#000">teal 500</div>
<div class="sw" style="background:var(--brand-teal-300);color:#000">teal 300</div>
<div class="sw" style="background:var(--brand-cyan-700);color:#fff">cyan 700</div>
<div class="sw" style="background:var(--brand-cyan-500);color:#000">cyan 500</div>
<div class="sw" style="background:var(--brand-cyan-300);color:#000">cyan 300</div>
</div>
</body></html>
