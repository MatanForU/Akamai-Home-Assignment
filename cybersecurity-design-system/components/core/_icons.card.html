<html><head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--bg-canvas);font-family:var(--font-sans);color:var(--fg-secondary)}
.grid{display:flex;flex-wrap:wrap;gap:22px;padding:20px}
.cell{display:flex;flex-direction:column;align-items:center;gap:6px;font:var(--text-mono-sm);width:76px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Icon } = window.DS;
const names = ["shield-check","shield-alert","lock","key","server","bug","activity","radar","alert-triangle","search","filter","bell","settings","layout-dashboard"];
function Demo(){
  return (
    <div className="grid">
      {names.map(n => (
        <div className="cell" key={n}>
          <Icon name={n} size={22} color="var(--accent-primary)" />
          {n}
        </div>
      ))}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body></html>
