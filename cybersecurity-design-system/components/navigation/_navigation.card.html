<html><head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--bg-canvas);font-family:var(--font-sans)}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Sidebar, Topbar, Tabs, Pagination, Breadcrumb, Button } = window.DS;
function Demo(){
  return (
    <div style={{display:"flex", height:460}}>
      <Sidebar productName="Sentra" activeValue="overview" items={[
        {value:"overview", label:"Overview"},
        {value:"alerts", label:"Alerts", badge:4},
        {value:"assets", label:"API Inventory"},
        {value:"policies", label:"Policies"},
      ]} />
      <div style={{flex:1, display:"flex", flexDirection:"column"}}>
        <Topbar title="Alerts" breadcrumb="Security" actions={<Button size="sm">New rule</Button>} />
        <div style={{padding:20, display:"flex", flexDirection:"column", gap:16}}>
          <Breadcrumb items={["Assets", "payments-api", "Endpoint /v2/charge"]} />
          <Tabs items={[{value:"open",label:"Open",count:12},{value:"resolved",label:"Resolved"},{value:"all",label:"All"}]} defaultValue="open" />
          <Pagination page={3} pageCount={12} />
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body></html>
